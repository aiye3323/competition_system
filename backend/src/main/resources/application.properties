
server.port=8080

# 排除 UserDetailsService 自动配置（使用 JWT 认证，不需要表单登录）
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# 关闭 Spring Boot 启动 banner
spring.main.banner-mode=off
# 精简启动日志
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.competition=INFO

spring.datasource.url=jdbc:mysql://localhost:3306/competition_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=YourJwtSecretKeyForCompetitionSystemMustBeAtLeast256BitsLong2024!
jwt.expiration=604800000

# 文件上传配置
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
app.upload.path=./uploads

# ========== 性能 & 并发配置 ==========

# Tomcat 线程池
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.max-connections=1000
server.tomcat.connection-timeout=30000

# HikariCP 数据库连接池
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000

# JPA 性能优化
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# 静态资源缓存
spring.web.resources.cache.period=604800
spring.web.resources.chain.cache=true

